name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Lint & Validate ────────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python code
        run: flake8 app/ --max-line-length=100 --ignore=E501,W292,W293

      - name: Validate Kubernetes manifests (kubeval)
        uses: instrumenta/kubeval-action@master
        with:
          files: k8s/

  # ─── Job 2: Build & Scan ──────────────────────────────────────────────────
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: lint

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/hubii-devops-challenge:${{ github.sha }}
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          docker build -t $IMAGE .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Reporta CVEs sem bloquear — CVEs da imagem base estão fora do nosso controle

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

      - name: Push image to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_LATEST=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/hubii-devops-challenge:latest
          docker tag ${{ env.IMAGE }} $IMAGE_LATEST
          docker push ${{ env.IMAGE }}
          docker push $IMAGE_LATEST