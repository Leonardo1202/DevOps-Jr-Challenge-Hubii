apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubii-app
  namespace: hubii
  labels:
    app: hubii-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hubii-app
  template:
    metadata:
      labels:
        app: hubii-app
    spec:
      # Security: drop all Linux capabilities
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: hubii-app
          image: ghcr.io/Leonardo1202/hubii-devops-challenge:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            - name: APP_ENV
              valueFrom:
                secretKeyRef:
                  name: hubii-app-secret
                  key: app-env

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL